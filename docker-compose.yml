services:
  backend:
    build:
      context: .
      dockerfile: backend-module/Dockerfile
    container_name: beneficios-backend
    ports:
      - "8080:8080"
    environment:
      APP_TRANSFER_JMS_ENABLED: ${APP_TRANSFER_JMS_ENABLED:-false}
      SPRING_ACTIVEMQ_BROKER_URL: ${SPRING_ACTIVEMQ_BROKER_URL:-tcp://broker:61616}
      SPRING_ACTIVEMQ_USER: ${SPRING_ACTIVEMQ_USER:-artemis}
      SPRING_ACTIVEMQ_PASSWORD: ${SPRING_ACTIVEMQ_PASSWORD:-artemis}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: beneficios-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  broker:
    image: vromero/activemq-artemis:2.31.2-alpine
    container_name: beneficios-broker
    profiles: ["jms"]
    environment:
      ARTEMIS_USERNAME: ${SPRING_ACTIVEMQ_USER:-artemis}
      ARTEMIS_PASSWORD: ${SPRING_ACTIVEMQ_PASSWORD:-artemis}
      ANONYMOUS_LOGIN: "false"
    ports:
      - "61616:61616"
      - "8161:8161"
    restart: unless-stopped
