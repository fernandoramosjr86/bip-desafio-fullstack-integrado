name: CI

on:
  push:
  pull_request:

permissions:
  contents: write
  security-events: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    env:
      MIN_LINE_COVERAGE: '80'
      MIN_BRANCH_COVERAGE: '70'
      MIN_FRONTEND_LINE_COVERAGE: '70'
      MIN_FRONTEND_BRANCH_COVERAGE: '60'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm run test:ci

      - name: Enforce frontend coverage thresholds
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          min_line = float(os.environ.get('MIN_FRONTEND_LINE_COVERAGE', '0'))
          min_branch = float(os.environ.get('MIN_FRONTEND_BRANCH_COVERAGE', '0'))

          search_roots = [Path('frontend/coverage'), Path('coverage'), Path('frontend')]
          summary_candidates = []
          lcov_candidates = []

          for root in search_roots:
              if not root.exists():
                  continue
              summary_candidates.extend(root.rglob('coverage-summary.json'))
              lcov_candidates.extend(root.rglob('lcov.info'))

          summary_candidates = sorted(set(summary_candidates))
          lcov_candidates = sorted(set(lcov_candidates))

          report = None
          line_pct = 0.0
          line_covered = 0
          line_total = 0
          branch_pct = 0.0
          branch_covered = 0
          branch_total = 0

          if summary_candidates:
              report = summary_candidates[0]
              payload = json.loads(report.read_text(encoding='utf-8'))
              total = payload.get('total', {})

              lines = total.get('lines', {})
              branches = total.get('branches', {})

              line_pct = float(lines.get('pct', 0.0))
              line_covered = int(lines.get('covered', 0))
              line_total = int(lines.get('total', 0))

              branch_pct = float(branches.get('pct', 0.0))
              branch_covered = int(branches.get('covered', 0))
              branch_total = int(branches.get('total', 0))
          elif lcov_candidates:
              report = lcov_candidates[0]
              for row in report.read_text(encoding='utf-8').splitlines():
                  if row.startswith('DA:'):
                      _, payload = row.split(':', 1)
                      _, hits = payload.split(',', 1)
                      line_total += 1
                      if int(hits) > 0:
                          line_covered += 1
                  elif row.startswith('BRDA:'):
                      _, payload = row.split(':', 1)
                      _, _, _, taken = payload.split(',', 3)
                      if taken != '-':
                          branch_total += 1
                          if int(taken) > 0:
                              branch_covered += 1

              line_pct = 0.0 if line_total == 0 else (line_covered * 100.0 / line_total)
              branch_pct = 0.0 if branch_total == 0 else (branch_covered * 100.0 / branch_total)
          else:
              discovered = []
              for root in [Path('frontend'), Path('.')]:
                  if not root.exists():
                      continue
                  discovered.extend(root.rglob('coverage-summary.json'))
                  discovered.extend(root.rglob('lcov.info'))

              print('Coverage files discovered in workspace:')
              if discovered:
                  for file in sorted(set(discovered)):
                      print(f' - {file}')
              else:
                  print(' - none')
              raise SystemExit(
                  'Frontend coverage report not found in expected paths: frontend/coverage/**, coverage/**, frontend/**'
              )

          print(
              f'Frontend line coverage: {line_pct:.1f}% '
              f'({line_covered}/{line_total})'
          )
          print(
              f'Frontend branch coverage: {branch_pct:.1f}% '
              f'({branch_covered}/{branch_total})'
          )
          print(f'Using report: {report}')

          failed_thresholds = []
          if line_pct < min_line:
              failed_thresholds.append(
                  f'Frontend line coverage {line_pct:.1f}% below minimum {min_line:.1f}%'
              )
          if branch_pct < min_branch:
              failed_thresholds.append(
                  f'Frontend branch coverage {branch_pct:.1f}% below minimum {min_branch:.1f}%'
              )

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a', encoding='utf-8') as handle:
                  handle.write('## Frontend Coverage\\n')
                  handle.write('\\n')
                  handle.write('| Metric | Coverage | Covered/Total |\\n')
                  handle.write('|---|---:|---:|\\n')
                  handle.write(
                      f"| Line | {line_pct:.1f}% | {line_covered}/{line_total} |\\n"
                  )
                  handle.write(
                      f"| Branch | {branch_pct:.1f}% | {branch_covered}/{branch_total} |\\n"
                  )
                  handle.write(
                      f"| Min Line Threshold | {min_line:.1f}% | - |\\n"
                  )
                  handle.write(
                      f"| Min Branch Threshold | {min_branch:.1f}% | - |\\n"
                  )
                  if failed_thresholds:
                      handle.write('\\n### Coverage Gate Failed\\n')
                      for reason in failed_thresholds:
                          handle.write(f'- {reason}\\n')

          if failed_thresholds:
              raise SystemExit('\\n'.join(failed_thresholds))
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Build and test with JaCoCo
        run: ./mvnw -B clean verify

      - name: Generate aggregated coverage badges
        run: |
          python - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          reports = [
              Path('backend-module/target/site/jacoco/jacoco.xml'),
              Path('ejb-module/target/site/jacoco/jacoco.xml'),
          ]

          totals = {
              'LINE': {'covered': 0, 'missed': 0},
              'BRANCH': {'covered': 0, 'missed': 0},
          }

          missing_reports = []

          for report in reports:
              if not report.exists():
                  missing_reports.append(str(report))
                  continue

              root = ET.parse(report).getroot()
              counters = {
                  c.attrib['type']: {
                      'covered': int(c.attrib['covered']),
                      'missed': int(c.attrib['missed']),
                  }
                  for c in root.findall('counter')
              }

              for kind in totals:
                  values = counters.get(kind, {'covered': 0, 'missed': 0})
                  totals[kind]['covered'] += values['covered']
                  totals[kind]['missed'] += values['missed']


          def percent(kind: str) -> float:
              covered = totals[kind]['covered']
              missed = totals[kind]['missed']
              total = covered + missed
              return 0.0 if total == 0 else (covered * 100.0 / total)


          def color(value: float) -> str:
              if value >= 90:
                  return '#4c1'
              if value >= 80:
                  return '#97CA00'
              if value >= 70:
                  return '#a4a61d'
              if value >= 60:
                  return '#dfb317'
              if value >= 50:
                  return '#fe7d37'
              return '#e05d44'


          def make_badge_svg(label: str, value: float, background: str) -> str:
              message = f'{value:.1f}%'
              label_width = max(92, 8 * len(label) + 18)
              message_width = max(64, 8 * len(message) + 16)
              total_width = label_width + message_width

              label_x = label_width / 2
              message_x = label_width + (message_width / 2)

              return f'''<svg xmlns="http://www.w3.org/2000/svg" width="{total_width}" height="20" role="img" aria-label="{label}: {message}">
            <rect width="{label_width}" height="20" fill="#555"/>
            <rect x="{label_width}" width="{message_width}" height="20" fill="{background}"/>
            <rect width="{total_width}" height="20" fill="transparent"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="{label_x}" y="14">{label}</text>
              <text x="{message_x}" y="14">{message}</text>
            </g>
          </svg>
          '''


          line_pct = percent('LINE')
          branch_pct = percent('BRANCH')

          badge_dir = Path('.github/badges')
          badge_dir.mkdir(parents=True, exist_ok=True)

          (badge_dir / 'coverage-line.svg').write_text(
              make_badge_svg('line coverage', line_pct, color(line_pct)),
              encoding='utf-8',
          )
          (badge_dir / 'coverage-branch.svg').write_text(
              make_badge_svg('branch coverage', branch_pct, color(branch_pct)),
              encoding='utf-8',
          )

          payload = {
              'line': {
                  'covered': totals['LINE']['covered'],
                  'missed': totals['LINE']['missed'],
                  'percent': round(line_pct, 2),
              },
              'branch': {
                  'covered': totals['BRANCH']['covered'],
                  'missed': totals['BRANCH']['missed'],
                  'percent': round(branch_pct, 2),
              },
          }
          (badge_dir / 'coverage-summary.json').write_text(
              json.dumps(payload, indent=2) + '\n',
              encoding='utf-8',
          )

          line_total = totals['LINE']['covered'] + totals['LINE']['missed']
          branch_total = totals['BRANCH']['covered'] + totals['BRANCH']['missed']
          min_line = float(os.environ.get('MIN_LINE_COVERAGE', '0'))
          min_branch = float(os.environ.get('MIN_BRANCH_COVERAGE', '0'))

          summary = (
              f"Line coverage: {line_pct:.1f}% ({totals['LINE']['covered']}/{line_total})\\n"
              f"Branch coverage: {branch_pct:.1f}% ({totals['BRANCH']['covered']}/{branch_total})"
          )
          print(summary)
          if missing_reports:
              print('Missing reports: ' + ', '.join(missing_reports))

          failed_thresholds = []
          if line_pct < min_line:
              failed_thresholds.append(
                  f'Line coverage {line_pct:.1f}% below minimum {min_line:.1f}%'
              )
          if branch_pct < min_branch:
              failed_thresholds.append(
                  f'Branch coverage {branch_pct:.1f}% below minimum {min_branch:.1f}%'
              )

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a', encoding='utf-8') as handle:
                  handle.write('## JaCoCo Coverage\\n')
                  handle.write('\\n')
                  handle.write('| Metric | Coverage | Covered/Total |\\n')
                  handle.write('|---|---:|---:|\\n')
                  handle.write(
                      f"| Line | {line_pct:.1f}% | {totals['LINE']['covered']}/{line_total} |\\n"
                  )
                  handle.write(
                      f"| Branch | {branch_pct:.1f}% | {totals['BRANCH']['covered']}/{branch_total} |\\n"
                  )
                  handle.write(
                      f"| Min Line Threshold | {min_line:.1f}% | - |\\n"
                  )
                  handle.write(
                      f"| Min Branch Threshold | {min_branch:.1f}% | - |\\n"
                  )
                  if failed_thresholds:
                      handle.write('\\n### Coverage Gate Failed\\n')
                      for reason in failed_thresholds:
                          handle.write(f'- {reason}\\n')

          if failed_thresholds:
              raise SystemExit('\\n'.join(failed_thresholds))
          PY

      - name: Build Docker images
        run: |
          docker build -f backend-module/Dockerfile -t beneficios-backend:ci .
          docker build -f frontend/Dockerfile -t beneficios-frontend:ci .

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: beneficios-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: beneficios-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload backend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Generate backend SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: beneficios-backend:ci
          format: cyclonedx
          output: sbom-backend.cdx.json
          exit-code: '0'

      - name: Generate frontend SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: beneficios-frontend:ci
          format: cyclonedx
          output: sbom-frontend.cdx.json
          exit-code: '0'

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            .github/badges/coverage-summary.json
            .github/badges/coverage-line.svg
            .github/badges/coverage-branch.svg
            trivy-backend.sarif
            trivy-frontend.sarif
            sbom-backend.cdx.json
            sbom-frontend.cdx.json
            frontend/coverage/**
            coverage/**
            backend-module/target/site/jacoco/**
            ejb-module/target/site/jacoco/**
          if-no-files-found: warn

      - name: Commit coverage badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(ci): update coverage badges [skip ci]'
          file_pattern: '.github/badges/*.svg .github/badges/*.json'
